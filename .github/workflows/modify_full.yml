name: Modify and Resign dylib

on:
  workflow_dispatch:
    inputs:
      old_text:
        description: Old text
        required: true
        type: string
      new_text:
        description: New text
        required: true
        type: string

jobs:
  modify:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Modify strings
        env:
          OLD: ${{ inputs.old_text }}
          NEW: ${{ inputs.new_text }}
        run: |
          echo  | base64 -d > replace.py
          python3 replace.py "插件收纳.dylib" "$OLD" "$NEW"

      - name: Resign
        run: |
          codesign --remove-signature "插件收纳_modified.dylib" 2>/dev/null || true
          codesign -f -s - "插件收纳_modified.dylib" 2>/dev/null || true
          echo "Resign done"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: modified-dylib
          path: 插件收纳_modified.dylib
          retention-days: 1
