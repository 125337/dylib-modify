name: Modify dylib strings

on:
  workflow_dispatch:
    inputs:
      old_text:
        description: '要替换的旧文字'
        required: true
        default: ''
      new_text:
        description: '替换后的新文字'
        required: true
        default: ''

jobs:
  modify:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Modify dylib
        run: |
          OLD="${{ github.event.inputs.old_text }}"
          NEW="${{ github.event.inputs.new_text }}"

          echo "替换: $OLD -> $NEW"
          
          cp 插件收纳.dylib 插件收纳_modified.dylib
          
          python3 -c "
import sys
old = '$OLD'
new = '$NEW'
with open('插件收纳_modified.dylib', 'rb') as f:
    data = f.read()
old_bytes = old.encode('utf-8')
new_bytes = new.encode('utf-8')
new_data = data.replace(old_bytes, new_bytes)
with open('插件收纳_modified.dylib', 'wb') as f:
    f.write(new_data)
print('替换完成')
"

      - name: Resign
        run: |
          codesign --remove-signature 插件收纳_modified.dylib 2>/dev/null || true
          codesign -f -s - 插件收纳_modified.dylib 2>/dev/null || true
          echo "签名完成"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: modified-dylib
          path: 插件收纳_modified.dylib
          retention-days: 1
