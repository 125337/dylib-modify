name: Modify dylib strings

on:
  workflow_dispatch:
    inputs:
      old_text:
        description: '要替换的旧文字'
        required: true
        default: ''
      new_text:
        description: '替换后的新文字'
        required: true
        default: ''

jobs:
  modify:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Modify strings
        run: |
          old="${{ github.event.inputs.old_text }}"
          new="${{ github.event.inputs.new_text }}"

          cp 插件收纳.dylib 插件收纳_modified.dylib
          perl -i -CSD -pe "s/\Q$old\E/\Q$new\E/g" 插件收纳_modified.dylib 2>/dev/null || true

      - name: Resign dylib
        run: |
          codesign --remove-signature 插件收纳_modified.dylib 2>/dev/null || true
          codesign -f -s - 插件收纳_modified.dylib 2>/dev/null || true
          echo "签名完成"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: modified-dylib
          path: 插件收纳_modified.dylib
          retention-days: 1
