name: Modify dylib

on:
  workflow_dispatch:
    inputs:
      old_text:
        description: 要替换的旧文字
        required: true
        type: string
      new_text:
        description: 替换后的新文字
        required: true
        type: string

jobs:
  modify:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace strings
        env:
          OLD_TEXT: ${{ inputs.old_text }}
          NEW_TEXT: ${{ inputs.new_text }}
        run: |
          cat > replace.py << 'PYEOF'
          import sys
          dylib = sys.argv[1]
          old = sys.argv[2]
          new = sys.argv[3]
          with open(dylib, 'rb') as f:
              data = f.read()
          ob = old.encode('utf-16le')
          nb = new.encode('utf-16le')
          if len(nb) > len(ob):
              nb = nb + b'\x20\x00' * ((len(ob) - len(nb)) // 2)
          data = data.replace(ob, nb)
          with open(dylib.replace('.dylib', '_modified.dylib'), 'wb') as f:
              f.write(data)
          print('done')
          PYEOF
          python3 replace.py 插件收纳.dylib "$OLD_TEXT" "$NEW_TEXT"

      - name: Resign
        run: |
          codesign --remove-signature 插件收纳_modified.dylib 2>/dev/null || true
          codesign -f -s - 插件收纳_modified.dylib 2>/dev/null || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: modified-dylib
          path: 插件收纳_modified.dylib
          retention-days: 1
