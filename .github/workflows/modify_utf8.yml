name: Modify dylib strings (UTF-8)

on:
  workflow_dispatch:
    inputs:
      old_text:
        description: '要替换的旧文字'
        required: true
        default: ''
      new_text:
        description: '替换后的新文字'
        required: true
        default: ''

jobs:
  modify:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Modify strings (Python method)
        run: |
          old="${{ github.event.inputs.old_text }}"
          new="${{ github.event.inputs.new_text }}"

          echo "原始文字: $old"
          echo "新文字: $new"

          python3 << 'EOF'
import sys

old_text = """${old}"""
new_text = """${new}"""

print(f"替换: '{old_text}' -> '{new_text}'")

with open('插件收纳.dylib', 'rb') as f:
    data = f.read()

old_bytes = old_text.encode('utf-8')
new_bytes = new_text.encode('utf-8')

print(f"旧文字字节数: {len(old_bytes)}")
print(f"新文字字节数: {len(new_bytes)}")

if len(new_bytes) > len(old_bytes):
    print("警告：新文字比旧文字长，可能导致问题！")
else:
    print("字节长度检查通过")

new_data = data.replace(old_bytes, new_bytes)

if new_data == data:
    print("警告：未找到要替换的文字！")
    sys.exit(1)
else:
    print(f"替换成功！修改了 {len(data) - len(new_data)} 字节")

with open('插件收纳_modified.dylib', 'wb') as f:
    f.write(new_data)
EOF

      - name: Verify replacement
        run: |
          python3 << 'EOF'
import sys

with open('插件收纳_modified.dylib', 'rb') as f:
    data = f.read()

new_text = """${new}"""
new_bytes = new_text.encode('utf-8')

if new_bytes in data:
    print(f"成功：新文字 '{new_text}' 存在于文件中")
else:
    print(f"失败：新文字 '{new_text}' 不在文件中")
    sys.exit(1)
EOF

      - name: Resign dylib
        run: |
          codesign --remove-signature 插件收纳_modified.dylib 2>/dev/null || true
          codesign -f -s - 插件收纳_modified.dylib 2>/dev/null || true
          echo "签名完成"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: modified-dylib
          path: 插件收纳_modified.dylib
          retention-days: 1
